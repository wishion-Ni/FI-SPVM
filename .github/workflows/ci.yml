name: Build and Test

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            configure_preset: dev-windows
            build_preset: build-dev-windows
            test_preset: test-dev-windows
          - os: ubuntu-latest
            configure_preset: dev-linux
            build_preset: build-dev-linux
            test_preset: test-dev-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          path: vcpkg

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        run: .\vcpkg\bootstrap-vcpkg.bat

      - name: Bootstrap vcpkg (Linux)
        if: runner.os == 'Linux'
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Configure
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: cmake --preset ${{ matrix.configure_preset }}

      - name: Build
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: cmake --build --preset ${{ matrix.build_preset }} --config Release

      - name: Test
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: ctest --preset ${{ matrix.test_preset }} --output-on-failure
